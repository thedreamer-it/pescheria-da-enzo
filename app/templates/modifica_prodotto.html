{% extends "base.html" %}
{% block content %}

<section class="page-head">
  <div>
    <p class="eyebrow">Magazzino</p>
    <h1 class="page-title">Modifica prodotto</h1>
    <p class="page-subtitle">
      Aggiorna i dati del prodotto in modo semplice e coerente con il magazzino.
    </p>
  </div>
</section>

<section class="card">
  <div class="section-head">
    <h3>{{ prodotto.nome }}</h3>
  </div>

  <form method="POST" class="form-box" style="padding: 0; margin: 0; border: 0; box-shadow: none; background: transparent;">
    <div class="form-grid">
      <div>
        <label for="nome">Prodotto</label>
        <input
          type="text"
          id="nome"
          name="nome"
          value="{{ prodotto.nome }}"
          required
        >
      </div>

      <div>
        <label for="unita_misura">Unità</label>
        <input
          type="text"
          id="unita_misura"
          name="unita_misura"
          value="{{ prodotto.unita_misura or 'kg' }}"
          required
        >
      </div>

      <div>
        <label for="costo">Costo</label>
        <input
          type="number"
          step="0.01"
          id="costo"
          name="costo"
          value="{{ prodotto.costo or 0 }}"
          required
        >
      </div>

      <div>
        <label for="prezzo_pubblico">Prezzo pubblico</label>
        <input
          type="number"
          step="0.01"
          id="prezzo_pubblico"
          name="prezzo_pubblico"
          value="{{ prodotto.prezzo_pubblico or 0 }}"
          required
        >
      </div>

      <div>
        <label for="giacenza">Giacenza</label>
        <input
          type="number"
          step="0.01"
          id="giacenza"
          name="giacenza"
          value="{{ prodotto.giacenza or 0 }}"
          required
        >
      </div>

      <div>
        <label for="image_url">Immagine URL</label>
        <input
          type="text"
          id="image_url"
          name="image_url"
          value="{{ prodotto.image_url or '' }}"
        >
      </div>
    </div>

    <div style="margin-top: 14px;">
      <label for="descrizione">Descrizione</label>
      <textarea
        id="descrizione"
        name="descrizione"
        rows="4"
      >{{ prodotto.descrizione or '' }}</textarea>
    </div>

    <div style="margin-top: 16px;" class="inline-form">
      <label class="checkbox-label">
        <input
          type="checkbox"
          name="disponibile"
          value="1"
          {% if prodotto.disponibile %}checked{% endif %}
        >
        Prodotto disponibile
      </label>
    </div>

    {% if prodotto.image_url %}
      <div style="margin-top: 18px;">
        <p class="muted" style="margin-bottom: 8px;">Anteprima immagine</p>
        <img
          src="{{ prodotto.image_url }}"
          alt="{{ prodotto.nome }}"
          style="max-width: 220px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);"
        >
      </div>
    {% endif %}

    <div style="margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap;">
      <button type="submit" class="btn-primary">Salva modifiche</button>

      <a
        href="{{ url_for('main.prodotti') }}"
        class="btn-primary"
        style="text-decoration: none; display: inline-flex; align-items: center; opacity: 0.85;"
      >
        Torna ai prodotti
      </a>
    </div>
  </form>
</section>

{% endblock %}
