{% extends "base.html" %}
{% block content %}
<h2>Nuovo ordine</h2>

<div class="order-wrap">
  <aside class="prod-list">
    <input id="search" placeholder="Cerca prodotto..." class="search">

    <div class="prod-grid" id="product-grid">
      {% for p in prodotti %}
      <div class="prod-card" data-id="{{ p.id }}" data-prezzo="{{ p.prezzo_pubblico }}" data-name="{{ p.nome|lower }}">
        <img src="{{ p.image_url or 'https://picsum.photos/seed/fish' ~ p.id ~ '/640/420' }}" alt="{{ p.nome }}" loading="lazy">
        <div class="prod-title">{{ p.nome }}</div>
        <div class="prod-sub">€ {{ '%.2f'|format(p.prezzo_pubblico) }} • {{ p.giacenza }} {{ p.unita_misura }}</div>
        <div class="badge {{ 'on' if p.disponibile else 'off' }}">{{ 'Disponibile' if p.disponibile else 'Non disponibile' }}</div>
        <button class="btn-add" {{ 'disabled' if not p.disponibile }}>Aggiungi</button>
      </div>
      {% endfor %}
    </div>
  </aside>

  <section class="cart">
    <h3>Carrello ordine</h3>
    <div id="cart-items"></div>

    <div class="cart-summary">
      <label>Cliente</label>
      <select id="cliente">
        <option value="">Senza cliente</option>
        {% for c in clienti %}
        <option value="{{ c.id }}">{{ c.nome }}</option>
        {% endfor %}
      </select>

      <label>Note</label>
      <textarea id="order-note" rows="3"></textarea>

      <div class="total-line">Totale: € <span id="total">0.00</span></div>
      <button id="place-order" class="btn-primary">Conferma ordine</button>
    </div>
  </section>
</div>

<script>
const cart = [];

function renderCart() {
  const wrap = document.getElementById('cart-items');
  wrap.innerHTML = '';
  let total = 0;

  cart.forEach((it, i) => {
    total += it.qty * it.prezzo;
    const el = document.createElement('div');
    el.className = 'cart-row';
    el.innerHTML = `<div>${it.nome} — ${it.qty} x €${it.prezzo.toFixed(2)}</div><div><button onclick="dec(${i})">–</button> <button onclick="inc(${i})">+</button> <button onclick="rm(${i})">x</button></div>`;
    wrap.appendChild(el);
  });

  document.getElementById('total').innerText = total.toFixed(2);
}

function dec(i) {
  cart[i].qty = Math.max(0, cart[i].qty - 1);
  if (cart[i].qty === 0) cart.splice(i, 1);
  renderCart();
}

function inc(i) {
  cart[i].qty += 1;
  renderCart();
}

function rm(i) {
  cart.splice(i, 1);
  renderCart();
}

document.querySelectorAll('.btn-add').forEach(btn => {
  btn.addEventListener('click', e => {
    const card = e.target.closest('.prod-card');
    const id = parseInt(card.dataset.id);
    const prezzo = parseFloat(card.dataset.prezzo);
    const nome = card.querySelector('.prod-title').innerText;
    const existing = cart.find(x => x.prodotto_id === id);
    if (existing) existing.qty += 1;
    else cart.push({ prodotto_id: id, nome, qty: 1, prezzo });
    renderCart();
  });
});

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.prod-card').forEach(card => {
    card.style.display = card.dataset.name.includes(q) ? '' : 'none';
  });
});

document.getElementById('place-order').addEventListener('click', async () => {
  const cliente_id = document.getElementById('cliente').value || null;
  const note = document.getElementById('order-note').value || '';

  if (cart.length === 0) {
    alert('Carrello vuoto');
    return;
  }

  const body = {
    cliente_id,
    articoli: cart.map(c => ({
      prodotto_id: c.prodotto_id,
      qty: c.qty,
      prezzo_unit: c.prezzo
    })),
    note
  };

  const res = await fetch('/api/ordina', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  const j = await res.json();
  if (j.ok) {
    alert('Ordine creato: #' + j.ordine_id);
    window.location.href = '/ordini/' + j.ordine_id;
  } else {
    alert(j.error || 'Errore ordine');
  }
});
</script>
{% endblock %}
