{% extends "base.html" %}
{% block content %}
<h2>Clienti</h2>

<div class="form-box">
  <form method="post" class="form-grid">
    <div>
      <label>Nome</label>
      <input name="nome" required>
    </div>
    <div>
      <label>Telefono</label>
      <input name="telefono">
    </div>
    <div>
      <label>Via</label>
      <input name="via">
    </div>
    <div>
      <label>Città</label>
      <input name="citta">
    </div>
    <div>
      <label>CAP</label>
      <input name="cap">
    </div>
    <div style="grid-column: 1 / -1;">
      <label>Note</label>
      <textarea name="note" rows="3"></textarea>
    </div>
    <div style="grid-column: 1 / -1;">
      <button class="btn-primary" type="submit">Salva cliente</button>
    </div>
  </form>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Telefono</th>
        <th>Città</th>
      </tr>
    </thead>
    <tbody>
      {% for c in clienti %}
      <tr>
        <td>{{ c.nome }}</td>
        <td>{{ c.telefono or '-' }}</td>
        <td>{{ c.citta or '-' }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3">Nessun cliente presente</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
