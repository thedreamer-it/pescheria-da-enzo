{% extends "base.html" %}
{% block content %}
<h2>Ordini</h2>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Stato</th>
        <th>Totale</th>
      </tr>
    </thead>
    <tbody>
      {% for o in ordini %}
      <tr>
        <td><a href="{{ url_for('main.ordine_dettaglio', ordine_id=o.id) }}">#{{ o.id }}</a></td>
        <td>{{ o.cliente.nome if o.cliente else 'Senza cliente' }}</td>
        <td>{{ o.stato }}</td>
        <td>€ {{ '%.2f'|format(o.totale or 0) }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="4">Nessun ordine presente</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
